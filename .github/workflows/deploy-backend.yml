name: Deploy Backend

on:
  push:
    branches:
      - MASTER
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_BACKEND_REPOSITORY }}
  BACKEND_INSTANCE_ID: ${{ vars.BACKEND_INSTANCE_ID }}
  BACKEND_SECRET_ID: ${{ vars.BACKEND_SECRET_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

      - name: Build backend image
        run: |
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${GITHUB_SHA}"
          docker build -t "$IMAGE_URI" ./backend
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Push backend image
        run: |
          docker push "$IMAGE_URI"

      - name: Deploy backend with SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$BACKEND_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend container from GitHub Actions" \
            --parameters 'commands=[
              "set -e",
              "AWS_REGION='${AWS_REGION}'",
              "AWS_ACCOUNT_ID='${AWS_ACCOUNT_ID}'",
              "IMAGE_URI='${IMAGE_URI}'",
              "BACKEND_SECRET_ID='${BACKEND_SECRET_ID}'",

              "aws ecr get-login-password --region \"$AWS_REGION\" | docker login --username AWS --password-stdin \"$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com\"",

              "SECRET_JSON=$(aws secretsmanager get-secret-value --region \"$AWS_REGION\" --secret-id \"$BACKEND_SECRET_ID\" --query SecretString --output text)",

              "DB_HOST=$(python3 -c \"import json,os; print(json.loads(os.environ['\''SECRET_JSON'\''])['\''DB_HOST'\''])\")",
              "DB_PORT=$(python3 -c \"import json,os; print(json.loads(os.environ['\''SECRET_JSON'\''])['\''DB_PORT'\''])\")",
              "DB_SERVICE_NAME=$(python3 -c \"import json,os; print(json.loads(os.environ['\''SECRET_JSON'\''])['\''DB_SERVICE_NAME'\''])\")",
              "DB_USERNAME=$(python3 -c \"import json,os; print(json.loads(os.environ['\''SECRET_JSON'\''])['\''DB_USERNAME'\''])\")",
              "DB_PASSWORD=$(python3 -c \"import json,os; print(json.loads(os.environ['\''SECRET_JSON'\''])['\''DB_PASSWORD'\''])\")",
              "JWT_SECRET=$(python3 -c \"import json,os; print(json.loads(os.environ['\''SECRET_JSON'\''])['\''JWT_SECRET'\''])\")",

              "docker pull \"$IMAGE_URI\"",
              "docker stop erp-backend || true",
              "docker rm erp-backend || true",

              "docker run -d --name erp-backend --restart unless-stopped -p 8080:8080 -e SPRING_PROFILES_ACTIVE=prod -e SERVER_PORT=8080 -e DB_HOST=\"$DB_HOST\" -e DB_PORT=\"$DB_PORT\" -e DB_SERVICE_NAME=\"$DB_SERVICE_NAME\" -e DB_USERNAME=\"$DB_USERNAME\" -e DB_PASSWORD=\"$DB_PASSWORD\" -e JWT_SECRET=\"$JWT_SECRET\" \"$IMAGE_URI\"",

              "docker ps"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"

      - name: Show SSM command result
        run: |
          sleep 10
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID"
